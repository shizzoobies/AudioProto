<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Embed test harness</title>
<style>
  body { margin: 0; font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; background: #18181b; color: #e4e4e7; }
  header { padding: 12px 16px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  header h1 { font-size: 15px; margin: 0 12px 0 0; font-weight: 600; }
  input { background: #27272a; color: #e4e4e7; border: 1px solid #3f3f46; border-radius: 6px; padding: 6px 10px; font-size: 13px; }
  #ct { width: 340px; }
  button { background: #2563eb; color: #fff; border: 0; border-radius: 6px; padding: 7px 14px; font-size: 13px; cursor: pointer; }
  iframe { display: block; width: 100%; max-width: 980px; height: 760px; border: 1px solid #3f3f46; border-radius: 8px; margin: 0 auto 12px; background: #fff; }
  #log { max-width: 980px; margin: 0 auto 24px; padding: 10px 12px; background: #09090b; border: 1px solid #27272a; border-radius: 8px; font-family: ui-monospace, monospace; font-size: 12px; white-space: pre-wrap; min-height: 60px; }
</style>
</head>
<body>
  <header>
    <h1>First Call embed harness</h1>
    <input id="ct" type="text" placeholder="course token (ct)">
    <input id="sid" type="text" value="demo_sales" size="12">
    <input id="learner" type="text" value="Harness Tester" size="14">
    <button id="load">Load embed</button>
  </header>
  <iframe id="frame" allow="microphone; autoplay" title="First Call embed"></iframe>
  <div id="log">postMessage events appear here.</div>
  <!-- External script: the site-wide CSP is script-src 'self' (no inline). -->
  <script src="/assets/js/embed-test.js"></script>
</body>
</html>
