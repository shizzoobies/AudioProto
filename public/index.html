<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Call Simulator</title>
<meta name="color-scheme" content="light">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap">
<link rel="stylesheet" href="/assets/css/styles.css">
</head>
<body class="auth-page">
  <main class="auth-card" aria-labelledby="auth-title">
    <div class="auth-mark" aria-hidden="true"></div>
    <h1 id="auth-title" class="auth-title">Call Simulator</h1>
    <p class="auth-subtitle">Enter the access password to continue.</p>
    <form id="auth-form" class="auth-form" novalidate>
      <input
        type="text"
        name="username"
        value="demo"
        autocomplete="username"
        class="visually-hidden"
        tabindex="-1"
        aria-hidden="true"
        readonly
      >
      <label for="password" class="auth-label">Password</label>
      <input
        type="password"
        id="password"
        name="password"
        class="auth-input"
        autocomplete="current-password"
        autofocus
        required
      >
      <button type="submit" class="auth-submit">Continue</button>
      <p id="auth-error" class="auth-error" role="alert" aria-live="polite"></p>
    </form>
  </main>
  <script src="/assets/js/login.js"></script>
</body>
</html>
